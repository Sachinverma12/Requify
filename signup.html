<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Requify</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>
<body>
  <header id="header">
    <nav class="container">
      <h1 class="logo">Requify</h1>
      <ul class="nav-links" id="navLinks">
        <li><a href="./index.html#Home">Home</a></li>
      </ul>
      <a href="./login.html" class="cta-btn">Login</a>
      <div class="mobile-menu-btn" id="mobileMenuBtn">
        <span></span><span></span><span></span>
      </div>
    </nav>
  </header>

  <main style="padding-top: 8rem;">
    <section class="auth-section">
      <div class="container">
        <div class="auth-card">
          <h2 class="auth-title">Create Account</h2>
          <p class="auth-subtitle">Sign up as user, owner, or admin.</p>

          <div class="role-pills" role="group" aria-label="Role">
            <input type="radio" name="role" id="role-user" value="user" checked />
            <label for="role-user">User</label>

            <input type="radio" name="role" id="role-owner" value="owner" />
            <label for="role-owner">Owner</label>

            <input type="radio" name="role" id="role-admin" value="admin" />
            <label for="role-admin">Admin</label>
          </div>

          <form id="signupForm" class="auth-form" autocomplete="off">
            <div class="form-group">
              <label for="signupName">Full Name</label>
              <input type="text" id="signupName" name="name" required minlength="2" />
            </div>

            <div class="form-group">
              <label for="signupEmail">Email</label>
              <input type="email" id="signupEmail" name="email" required />
            </div>

            <div class="form-group">
              <label for="signupPassword">Password</label>
              <input type="password" id="signupPassword" name="password" required minlength="8" />
            </div>

            <div id="authMessage" class="auth-message" role="status"></div>

            <button class="submit-btn" type="submit">Sign Up</button>
          </form>

          <div class="auth-footer">
            <span>Already have an account?</span>
            <a href="./login.html">Login</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="motion.js"></script>
  <script src="./auth.js"></script>
  <script>
    const signupForm = document.getElementById('signupForm');

    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    function validatePassword(password) {
      return password && password.length >= 8;
    }

    function validateName(name) {
      return name && name.trim().length >= 2;
    }

    function showFieldError(fieldId, message) {
      const field = document.getElementById(fieldId);
      if (!field) return;
      
      field.style.borderColor = '#ef4444';
      
      let error = field.parentElement.querySelector('.field-error');
      if (!error) {
        error = document.createElement('div');
        error.className = 'field-error';
        error.style.color = '#ef4444';
        error.style.fontSize = '0.85rem';
        error.style.marginTop = '0.25rem';
        field.parentElement.appendChild(error);
      }
      error.textContent = message;
    }

    function clearFieldError(fieldId) {
      const field = document.getElementById(fieldId);
      if (!field) return;
      field.style.borderColor = '#e9ecef';
      const error = field.parentElement.querySelector('.field-error');
      if (error) error.remove();
    }

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const role = document.querySelector('input[name="role"]:checked')?.value;
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;

      clearFieldError('signupName');
      clearFieldError('signupEmail');
      clearFieldError('signupPassword');

      let isValid = true;

      if (!name) {
        showFieldError('signupName', 'Name is required');
        isValid = false;
      } else if (!validateName(name)) {
        showFieldError('signupName', 'Name must be at least 2 characters');
        isValid = false;
      }

      if (!email) {
        showFieldError('signupEmail', 'Email is required');
        isValid = false;
      } else if (!validateEmail(email)) {
        showFieldError('signupEmail', 'Please enter a valid email');
        isValid = false;
      }

      if (!password) {
        showFieldError('signupPassword', 'Password is required');
        isValid = false;
      } else if (!validatePassword(password)) {
        showFieldError('signupPassword', 'Password must be at least 8 characters');
        isValid = false;
      }

      if (!isValid) return;

      try {
        renderToast('Creating account...', false);
        const data = await apiPost('/api/auth/signup', { name, email, password, role });
        setSession(data.token, data.user);
        showToast('Account created successfully!', 'success');
        setTimeout(() => {
          window.location.href = './index.html';
        }, 500);
      } catch (err) {
        renderToast(err.message, true);
      }
    });

    document.getElementById('signupName').addEventListener('blur', function() {
      clearFieldError('signupName');
      if (this.value && !validateName(this.value)) {
        showFieldError('signupName', 'Name must be at least 2 characters');
      }
    });

    document.getElementById('signupEmail').addEventListener('blur', function() {
      clearFieldError('signupEmail');
      if (this.value && !validateEmail(this.value)) {
        showFieldError('signupEmail', 'Please enter a valid email');
      }
    });

    document.getElementById('signupPassword').addEventListener('blur', function() {
      clearFieldError('signupPassword');
      if (this.value && !validatePassword(this.value)) {
        showFieldError('signupPassword', 'Password must be at least 8 characters');
      }
    });
  </script>
</body>
</html>
